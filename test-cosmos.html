<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Cosmos Effect</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; overflow-x: hidden; }

  .hero-container {
    position: relative;
    width: 100%;
    height: 300vh;
  }

  canvas.hero-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .hero-content {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2;
    pointer-events: none;
  }

  .hero-title {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: clamp(3rem, 12vw, 10rem);
    font-weight: 900;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: linear-gradient(180deg, #ffffff 0%, #6699cc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transform: translateY(60px);
    animation: titleIn 1.5s ease-out 0.3s forwards;
  }

  @keyframes titleIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-subtitle {
    text-align: center;
    margin-top: 1.5rem;
    opacity: 0;
    animation: subIn 1.2s ease-out 0.8s forwards;
  }

  @keyframes subIn {
    to { opacity: 1; }
  }

  .subtitle-line {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.3rem);
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    line-height: 1.8;
    letter-spacing: 0.15em;
  }

  /* Side menu */
  .side-menu {
    position: fixed;
    left: 2rem;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    opacity: 0;
    animation: menuIn 1s ease-out 0.5s forwards;
  }

  @keyframes menuIn {
    to { opacity: 1; }
  }

  .menu-icon {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
  }

  .menu-icon span {
    width: 24px;
    height: 2px;
    background: rgba(255,255,255,0.6);
    transition: 0.3s;
  }

  .vertical-text {
    writing-mode: vertical-rl;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.4);
  }

  /* Scroll indicator */
  .scroll-progress {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 1rem;
    opacity: 0;
    animation: scrollIn 1s ease-out 1.2s forwards;
  }

  @keyframes scrollIn {
    to { opacity: 1; }
  }

  .scroll-text {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.4);
  }

  .progress-track {
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4488cc, #88aaff);
    border-radius: 1px;
    transition: width 0.1s;
  }

  .section-counter {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.4);
  }

  /* Content sections */
  .scroll-sections {
    position: relative;
    z-index: 2;
    margin-top: 100vh;
  }

  .content-section {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }

  .content-section .hero-title {
    opacity: 0;
    animation: none;
  }

  .content-section .hero-subtitle {
    opacity: 0;
    animation: none;
  }

  .content-section.visible .hero-title {
    animation: titleIn 1.5s ease-out forwards;
  }

  .content-section.visible .hero-subtitle {
    animation: subIn 1.2s ease-out 0.3s forwards;
  }

  /* Back link */
  .back-link {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 20;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.15em;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 0.5rem 1rem;
    border-radius: 4px;
    transition: 0.3s;
  }
  .back-link:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">VOLVER A PARALLAX</a>

<div class="hero-container">
  <canvas id="heroCanvas" class="hero-canvas"></canvas>

  <!-- Side menu -->
  <div class="side-menu">
    <div class="menu-icon">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="vertical-text">SPACE</div>
  </div>

  <!-- Main content -->
  <div class="hero-content" id="heroContent">
    <h1 class="hero-title">HORIZON</h1>
    <div class="hero-subtitle">
      <p class="subtitle-line">Where vision meets reality,</p>
      <p class="subtitle-line">we shape the future of tomorrow</p>
    </div>
  </div>

  <!-- Scroll progress -->
  <div class="scroll-progress">
    <div class="scroll-text">SCROLL</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="section-counter" id="sectionCounter">01 / 02</div>
  </div>

  <!-- Scroll sections -->
  <div class="scroll-sections">
    <section class="content-section" id="section1">
      <h1 class="hero-title">COSMOS</h1>
      <div class="hero-subtitle">
        <p class="subtitle-line">Beyond the boundaries of imagination,</p>
        <p class="subtitle-line">lies the universe of possibilities</p>
      </div>
    </section>
    <section class="content-section" id="section2">
      <h1 class="hero-title">INFINITY</h1>
      <div class="hero-subtitle">
        <p class="subtitle-line">In the space between thought and creation,</p>
        <p class="subtitle-line">we find the essence of true innovation</p>
      </div>
    </section>
  </div>
</div>

<!-- Three.js via CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// Scene
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.00025);

// Camera
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 20, 100);

// Renderer
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('heroCanvas'), antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.5;

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.8, 0.4, 0.85));

// Stars
const stars = [];
for (let layer = 0; layer < 3; layer++) {
  const count = 5000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const siz = new Float32Array(count);

  for (let j = 0; j < count; j++) {
    const r = 200 + Math.random() * 800;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(Math.random() * 2 - 1);
    pos[j*3] = r * Math.sin(p) * Math.cos(t);
    pos[j*3+1] = r * Math.sin(p) * Math.sin(t);
    pos[j*3+2] = r * Math.cos(p);

    const c = new THREE.Color();
    const ch = Math.random();
    if (ch < 0.7) c.setHSL(0, 0, 0.8 + Math.random() * 0.2);
    else if (ch < 0.9) c.setHSL(0.08, 0.5, 0.8);
    else c.setHSL(0.6, 0.5, 0.8);
    col[j*3] = c.r; col[j*3+1] = c.g; col[j*3+2] = c.b;
    siz[j] = Math.random() * 2 + 0.5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(siz, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 }, depth: { value: layer } },
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      uniform float time;
      uniform float depth;
      void main() {
        vColor = color;
        vec3 pos = position;
        float angle = time * 0.05 * (1.0 - depth * 0.3);
        mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
        pos.xy = rot * pos.xy;
        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = size * (300.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        float d = length(gl_PointCoord - vec2(0.5));
        if (d > 0.5) discard;
        float o = 1.0 - smoothstep(0.0, 0.5, d);
        gl_FragColor = vec4(vColor, o);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  stars.push(pts);
}

// Nebula
const nebulaGeo = new THREE.PlaneGeometry(8000, 4000, 100, 100);
const nebulaMat = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
    color1: { value: new THREE.Color(0x0033ff) },
    color2: { value: new THREE.Color(0xff0066) },
    opacity: { value: 0.3 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying float vElev;
    uniform float time;
    void main() {
      vUv = uv;
      vec3 pos = position;
      float e = sin(pos.x * 0.01 + time) * cos(pos.y * 0.01 + time) * 20.0;
      pos.z += e;
      vElev = e;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 color1;
    uniform vec3 color2;
    uniform float opacity;
    uniform float time;
    varying vec2 vUv;
    varying float vElev;
    void main() {
      float mix_f = sin(vUv.x * 10.0 + time) * cos(vUv.y * 10.0 + time);
      vec3 color = mix(color1, color2, mix_f * 0.5 + 0.5);
      float alpha = opacity * (1.0 - length(vUv - 0.5) * 2.0);
      alpha *= 1.0 + vElev * 0.01;
      gl_FragColor = vec4(color, alpha);
    }
  `,
  transparent: true,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
  depthWrite: false
});
const nebula = new THREE.Mesh(nebulaGeo, nebulaMat);
nebula.position.z = -1050;
scene.add(nebula);

// Mountains
const mountains = [];
const mountainLocations = [];
const layers = [
  { distance: -50, height: 60, color: 0x1a1a2e, opacity: 1 },
  { distance: -100, height: 80, color: 0x16213e, opacity: 0.8 },
  { distance: -150, height: 100, color: 0x0f3460, opacity: 0.6 },
  { distance: -200, height: 120, color: 0x0a4668, opacity: 0.4 }
];

layers.forEach((layer, i) => {
  const points = [];
  for (let j = 0; j <= 50; j++) {
    const x = (j / 50 - 0.5) * 1000;
    const y = Math.sin(j * 0.1) * layer.height + Math.sin(j * 0.05) * layer.height * 0.5 + Math.random() * layer.height * 0.2 - 100;
    points.push(new THREE.Vector2(x, y));
  }
  points.push(new THREE.Vector2(5000, -300));
  points.push(new THREE.Vector2(-5000, -300));

  const shape = new THREE.Shape(points);
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshBasicMaterial({ color: layer.color, transparent: true, opacity: layer.opacity, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.z = layer.distance;
  mesh.position.y = layer.distance;
  mesh.userData = { baseZ: layer.distance, index: i };
  scene.add(mesh);
  mountains.push(mesh);
  mountainLocations.push(layer.distance);
});

// Atmosphere
const atmGeo = new THREE.SphereGeometry(600, 32, 32);
const atmMat = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec3 vNormal;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying vec3 vNormal;
    uniform float time;
    void main() {
      float i = pow(0.7 - dot(vNormal, vec3(0,0,1)), 2.0);
      vec3 atm = vec3(0.3, 0.6, 1.0) * i;
      atm *= sin(time * 2.0) * 0.1 + 0.9;
      gl_FragColor = vec4(atm, i * 0.25);
    }
  `,
  side: THREE.BackSide,
  blending: THREE.AdditiveBlending,
  transparent: true
});
scene.add(new THREE.Mesh(atmGeo, atmMat));

// Smooth camera
const smoothCam = { x: 0, y: 30, z: 100 };
let targetCam = { x: 0, y: 30, z: 300 };

// Scroll
const progressFill = document.getElementById('progressFill');
const sectionCounter = document.getElementById('sectionCounter');
const sections = document.querySelectorAll('.content-section');

function handleScroll() {
  const scrollY = window.scrollY;
  const maxScroll = document.documentElement.scrollHeight - innerHeight;
  const progress = Math.min(scrollY / maxScroll, 1);

  progressFill.style.width = (progress * 100) + '%';
  const section = Math.floor(progress * 2);
  sectionCounter.textContent = String(section).padStart(2, '0') + ' / 02';

  const sectionProgress = (progress * 2) % 1;

  const camPositions = [
    { x: 0, y: 30, z: 300 },
    { x: 0, y: 40, z: -50 },
    { x: 0, y: 50, z: -700 }
  ];

  const curr = camPositions[section] || camPositions[0];
  const next = camPositions[section + 1] || curr;

  targetCam.x = curr.x + (next.x - curr.x) * sectionProgress;
  targetCam.y = curr.y + (next.y - curr.y) * sectionProgress;
  targetCam.z = curr.z + (next.z - curr.z) * sectionProgress;

  mountains.forEach((m, i) => {
    const speed = 1 + i * 0.9;
    if (progress > 0.7) m.position.z = 600000;
    else m.position.z = mountainLocations[i];
  });

  nebula.position.z = mountains[3].position.z;

  // Show/hide sections
  sections.forEach((s, i) => {
    const rect = s.getBoundingClientRect();
    if (rect.top < innerHeight * 0.7 && rect.bottom > 0) {
      s.classList.add('visible');
    } else {
      s.classList.remove('visible');
    }
  });

  // Fade first section content
  const heroContent = document.getElementById('heroContent');
  heroContent.style.opacity = Math.max(0, 1 - scrollY / (innerHeight * 0.5));
}

window.addEventListener('scroll', handleScroll);

// Animate
function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;

  stars.forEach(s => { if (s.material.uniforms) s.material.uniforms.time.value = time; });
  if (nebula.material.uniforms) nebula.material.uniforms.time.value = time * 0.5;

  // Smooth camera
  smoothCam.x += (targetCam.x - smoothCam.x) * 0.05;
  smoothCam.y += (targetCam.y - smoothCam.y) * 0.05;
  smoothCam.z += (targetCam.z - smoothCam.z) * 0.05;

  camera.position.x = smoothCam.x + Math.sin(time * 0.1) * 2;
  camera.position.y = smoothCam.y + Math.cos(time * 0.15) * 1;
  camera.position.z = smoothCam.z;
  camera.lookAt(0, 10, -600);

  mountains.forEach((m, i) => {
    const pf = 1 + i * 0.5;
    m.position.x = Math.sin(time * 0.1) * 2 * pf;
    m.position.y = 50 + Math.cos(time * 0.15) * 1 * pf;
  });

  composer.render();
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
